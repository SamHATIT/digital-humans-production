<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Humans — Documentation Technique</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f14;
    --bg-card: #151922;
    --bg-card-hover: #1a1f2b;
    --bg-sidebar: #10131a;
    --border: #1e2433;
    --text: #c8cdd8;
    --text-dim: #6b7280;
    --text-bright: #eef0f4;
    --accent: #4f8cff;
    --accent-dim: #2a4a8a;
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --orange: #fb923c;
    --orange-dim: rgba(251,146,60,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --yellow: #fbbf24;
    --cyan: #22d3ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    min-height: 100vh;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: fixed;
    top: 0;
    left: 0;
    overflow-y: auto;
    z-index: 100;
  }

  .sidebar-header {
    padding: 0 24px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .sidebar-header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -0.3px;
  }

  .sidebar-header .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .nav-section {
    padding: 8px 16px;
  }

  .nav-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    padding: 8px;
    margin-top: 8px;
  }

  .nav-link {
    display: block;
    padding: 8px 12px;
    border-radius: 8px;
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    font-weight: 400;
    transition: all 0.15s;
    cursor: pointer;
  }

  .nav-link:hover { background: var(--bg-card); color: var(--text-bright); }
  .nav-link.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }

  /* Main */
  .main {
    margin-left: 280px;
    flex: 1;
    padding: 48px 64px;
    max-width: 960px;
  }

  .section { display: none; }
  .section.active { display: block; }

  h2 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  h3 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-bright);
    margin-top: 36px;
    margin-bottom: 12px;
  }

  h4 {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    margin-top: 24px;
    margin-bottom: 8px;
  }

  .section-desc {
    font-size: 15px;
    color: var(--text-dim);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  p { margin-bottom: 16px; }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--accent-dim); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-bright);
  }

  .card-subtitle {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Agent cards */
  .agent-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .agent-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
  }
  .agent-card:hover { border-color: var(--accent-dim); transform: translateY(-2px); }

  .agent-name { font-weight: 600; color: var(--text-bright); font-size: 15px; }
  .agent-role { font-size: 13px; color: var(--accent); margin-bottom: 8px; }
  .agent-file { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
  .agent-desc { font-size: 13px; color: var(--text); line-height: 1.5; }

  /* Tags */
  .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-critical { background: var(--red-dim); color: var(--red); }
  .tag-major { background: var(--orange-dim); color: var(--orange); }
  .tag-medium { background: var(--purple-dim); color: var(--purple); }
  .tag-done { background: var(--green-dim); color: var(--green); }
  .tag-pending { background: rgba(107,114,128,0.15); color: var(--text-dim); }
  .tag-active { background: var(--orange-dim); color: var(--orange); }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0 24px;
    font-size: 14px;
  }
  th {
    text-align: left;
    padding: 10px 14px;
    background: var(--bg-card);
    color: var(--text-dim);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:hover td { background: rgba(79,140,255,0.03); }

  /* Code */
  code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: rgba(79,140,255,0.08);
    padding: 2px 7px;
    border-radius: 5px;
    color: var(--accent);
  }

  pre {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    overflow-x: auto;
    margin: 16px 0 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
  }

  /* Mermaid */
  .mermaid-wrapper {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 24px;
    margin: 20px 0 28px;
    overflow-x: auto;
  }
  .mermaid { display: flex; justify-content: center; }
  .mermaid svg { max-width: 100%; }

  /* Stats row */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .stat-value { font-size: 32px; font-weight: 700; color: var(--text-bright); }
  .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Timeline */
  .timeline { position: relative; padding-left: 28px; margin: 24px 0; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 4px;
    bottom: 4px;
    width: 2px;
    background: var(--border);
  }
  .timeline-item { position: relative; margin-bottom: 28px; }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: -24px;
    top: 6px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: var(--bg);
  }
  .timeline-item.done::before { background: var(--green); border-color: var(--green); }
  .timeline-item.active::before { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .timeline-date { font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .timeline-title { font-size: 15px; font-weight: 600; color: var(--text-bright); margin: 4px 0; }
  .timeline-desc { font-size: 13px; color: var(--text); }

  /* Services status */
  .service-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .service-name { font-weight: 500; color: var(--text-bright); }
  .service-port { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px;
  }
  .status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.inactive { background: var(--red); }
  .status-dot.partial { background: var(--orange); }

  /* Responsive */
  @media (max-width: 900px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 24px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .agent-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<script>
  // Navigation
  function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
    window.scrollTo(0, 0);
  }

  // Mermaid init
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      primaryColor: '#1e2433',
      primaryTextColor: '#c8cdd8',
      primaryBorderColor: '#4f8cff',
      lineColor: '#4f8cff',
      secondaryColor: '#151922',
      tertiaryColor: '#151922',
      fontFamily: 'DM Sans, sans-serif',
      fontSize: '13px'
    },
    flowchart: { curve: 'basis', padding: 16 },
    sequence: { actorMargin: 40, messageMargin: 30 }
  });

  // Render mermaid on section change
  async function renderMermaid() {
    const elements = document.querySelectorAll('.section.active .mermaid');
    for (const el of elements) {
      if (!el.getAttribute('data-processed')) {
        const { svg } = await mermaid.render('mermaid-' + Math.random().toString(36).substr(2, 9), el.textContent);
        el.innerHTML = svg;
        el.setAttribute('data-processed', 'true');
      }
    }
  }

  // Override showSection to also render mermaid
  const originalShow = showSection;
  showSection = function(id) {
    originalShow(id);
    setTimeout(renderMermaid, 50);
  };

  // Initial render
  document.addEventListener('DOMContentLoaded', () => setTimeout(renderMermaid, 100));
</script>
