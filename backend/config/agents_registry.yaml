  # -------------------------------------------------------------------------
  jordan:
    name: Jordan
    role: DevOps Engineer
    role_fr: DevOps / CI-CD
    agent_type: devops
    aliases: [devops]
    script: salesforce_devops.py
    prompt_file: jordan_devops
    tier: worker
    complexity: complex
    color: yellow
    cost_estimate_usd: 0.30
    rag_collections: [technical, operations]
    artifact_needs: [code, config, test]
    cr_categories: [integration]
    deliverable_types: [devops_deployment_strategy, devops_ci_cd]
    chat:
      enabled: true
      system_prompt: |
        Tu es Jordan, DevOps Engineer senior spécialisé Salesforce.
        Tu as planifié le pipeline CI/CD et la stratégie de déploiement du projet "{project_name}".
        Tu peux expliquer la stratégie de déploiement, les environnements, et les pipelines CI/CD.
        Réponds en français, de manière technique et concrète.

  # -------------------------------------------------------------------------
  # Aisha — Data Migration
  # -------------------------------------------------------------------------
  aisha:
    name: Aisha
    role: Data Migration Specialist
    role_fr: Data Migration
    agent_type: data
    aliases: [data, data_migration]
    script: salesforce_data_migration.py
    prompt_file: aisha_data
    tier: worker
    complexity: complex
    color: orange
    cost_estimate_usd: 0.40
    rag_collections: [technical, operations]
    artifact_needs: [spec, business_req]
    cr_categories: [data_model]
    deliverable_types: [data_migration_plan, data_mapping]
    chat:
      enabled: true
      system_prompt: |
        Tu es Aisha, Data Migration Specialist senior spécialisée Salesforce.
        Tu as conçu le plan de migration de données du projet "{project_name}".
        Tu peux expliquer les mappings, les stratégies de migration, et les validations.
        Réponds en français, de manière structurée et rigoureuse.

  # -------------------------------------------------------------------------
  # Lucas — Trainer
  # -------------------------------------------------------------------------
  lucas:
    name: Lucas
    role: Trainer
    role_fr: Trainer
    agent_type: trainer
    aliases: [trainer]
    script: salesforce_trainer.py
    prompt_file: lucas_trainer
    tier: worker
    complexity: complex
    color: teal
    cost_estimate_usd: 0.30
    rag_collections: [business, operations]
    artifact_needs: [use_case, business_req, doc]
    cr_categories: []
    deliverable_types: [trainer_plan, trainer_materials]
    chat:
      enabled: true
      system_prompt: |
        Tu es Lucas, Trainer senior spécialisé Salesforce.
        Tu as conçu le plan de formation du projet "{project_name}".
        Tu peux expliquer les modules, les audiences cibles, et les approches pédagogiques.
        Réponds en français, de manière pédagogique et engageante.

# ---------------------------------------------------------------------------
# CR category → impacted agents fallback.
# Built automatically from each agent's `cr_categories` list, but overridden here
# for categories where the heuristic does not cover all impacted agents.
# ---------------------------------------------------------------------------
cr_category_overrides:
  business_rule: [olivia, marcus, diego, raj, elena]
  data_model: [marcus, diego, aisha, elena]
  process: [olivia, marcus, raj, elena]
  ui_ux: [zara, elena]
  integration: [marcus, diego, jordan]
  security: [marcus, raj, elena]
  other: [olivia, marcus]

# ---------------------------------------------------------------------------
# Default RAG collections used when no agent-specific mapping applies.
# ---------------------------------------------------------------------------
default_rag_collections: [technical, operations, business]
