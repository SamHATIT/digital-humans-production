# LLM Router Configuration — Digital Humans Platform
# Multi-profile routing with 2 logical tiers (orchestrator / worker).
#
# Updated: 2026-04-25 — Migration Opus 4.6 → 4.7, Sonnet 4.5 → 4.6, pricing Opus.
#   - claude-opus.model_id   : claude-opus-4-6 → claude-opus-4-7
#   - claude-sonnet.model_id : claude-sonnet-4-5-20250929 → claude-sonnet-4-6
#   - pricing/anthropic/claude-opus: $15/$75 → $5/$25 (était obsolète, vrai prix
#     Anthropic 2026 pour Opus 4.x = $5/$25, vérifié sur docs.claude.com).
#   - Pas de changement pricing Sonnet/Haiku (Sonnet 4.6 reste à $3/$15).
#
# Updated: 2026-04-18 — Agent C (session3) :
#   - Consolidation vers 2 tiers logiques : orchestrator (Opus-class) / worker (Sonnet-class).
#   - Support 3 deployment profiles : cloud / on-premise / freemium.
#   - Source de vérité unique : ce fichier YAML remplace ANTHROPIC_MODELS/OPENAI_MODELS/AGENT_TIER_MAP hardcodés.
#   - Pricing réel consommé par budget_service.py (plus de MODEL_PRICING hardcodé).
#
# Résout findings : N21, N22, N23, N28, N31, N33, N35, N41, N42, N43, N45, N86.
#
# Profile actif : sélectionné via env var DH_DEPLOYMENT_PROFILE (default: cloud).

active_profile: "${DH_DEPLOYMENT_PROFILE}"   # cloud | on-premise | freemium — defaults to "cloud" if unset
default_profile: "cloud"

# =============================================================================
# Agent tier mapping — agent_type → logical tier (orchestrator | worker)
# Source de vérité unique. Aliases (code agent_type + display name) listés pour
# tolérer les deux conventions utilisées historiquement dans le codebase.
# =============================================================================
agent_tier_map:
  # Orchestrator tier — reasoning lourd, synthèse, design
  pm:                 orchestrator   # Sophie
  pm_orchestrator:    orchestrator   # Sophie (alias)
  sophie:             orchestrator   # Sophie (display)
  architect:          orchestrator   # Marcus
  solution_architect: orchestrator   # Marcus (alias)
  marcus:             orchestrator   # Marcus (display)
  ba:                 orchestrator   # Olivia — UCs demandent Opus (décision CRIT-02)
  business_analyst:   orchestrator   # Olivia (alias)
  olivia:             orchestrator   # Olivia (display)
  research:           orchestrator   # Emma — synthèse SDS
  research_analyst:   orchestrator   # Emma (alias)
  emma:               orchestrator   # Emma (display)

  # Worker tier — exécution spécialisée, outputs longs mais moins de raisonnement abstrait
  apex:               worker
  apex_developer:     worker
  developer_apex:     worker
  diego:              worker
  lwc:                worker
  lwc_developer:      worker
  developer_lwc:      worker
  zara:               worker
  admin:              worker
  sf_admin:           worker
  raj:                worker
  qa:                 worker
  qa_tester:          worker
  elena:              worker
  devops:             worker
  jordan:             worker
  data:               worker
  data_migration:     worker
  aisha:              worker
  trainer:            worker
  lucas:              worker

# =============================================================================
# Deployment profiles — chaque profile mappe chaque tier vers un provider/model.
# Format : profiles.<profile>.<tier> = "<provider>/<model_alias>"
# Le model_alias doit exister dans providers.<provider>.models.
# =============================================================================
profiles:

  # --- Profile 1 : cloud (production VPS) ---
  # Anthropic pour tout, pas de Ollama. BUILD activé.
  # Profile par défaut pour les tiers Team et Enterprise (et dev).
  cloud:
    build_enabled: true
    orchestrator: "anthropic/claude-opus"
    worker:       "anthropic/claude-sonnet"
    fallback_chain:
      "anthropic/claude-opus":   "anthropic/claude-sonnet"
      "anthropic/claude-sonnet": "anthropic/claude-haiku"

    # Tier-based overrides — appliqués UNIQUEMENT quand subscription_tier
    # est passé dans le LLMRequest (sera branché en Phase 3 backend, en
    # même temps que le wiring Stripe + propagation tier user → request).
    #
    # Décision actée 29 avril 2026 : pour le tier Pro 49€, Marcus reste en
    # Opus (vitrine technique du SDS, agent le plus scruté par les clients
    # Salesforce techies — 56 % du coût SDS à lui seul). Les 3 autres
    # orchestrators (Sophie/Olivia/Emma) passent en Sonnet sur Pro.
    #
    # Les autres tiers (free, team, enterprise) ne sont pas listés ici car
    # ils utilisent les mappings tier→provider standard sans override agent-level.
    tier_overrides:
      pro:
        # Par défaut : tous les orchestrators tournent en Sonnet pour le tier Pro
        orchestrator_default: "anthropic/claude-sonnet"
        # Sauf agents listés ici qui gardent leur mapping standard (Opus)
        agents_keep_orchestrator:
          # Tous les aliases Marcus / Solution Architect — vitrine technique du SDS,
          # 56% du coût SDS, le SaaS Pro 49€ doit garder Opus ici sinon la
          # qualité du livrable se dégrade. Les autres orchestrators (Sophie/
          # Olivia/Emma) tournent en Sonnet pour ce tier (downgrade contrôlé).
          - marcus
          - architect
          - solution_architect
        # Worker tier inchangé (Sonnet)

  # --- Profile 2 : on-premise (client airgapped) ---
  # Ollama local pour tout. AUCUN fallback cloud (confidentialité).
  # Si local/mixtral down, l'erreur remonte telle quelle à l'utilisateur.
  on-premise:
    build_enabled: true
    orchestrator: "local/mixtral"
    worker:       "local/mistral:7b-instruct"
    fallback_chain:
      "local/mixtral":            "local/mistral-nemo"
      "local/mistral:7b-instruct": "local/mistral-nemo"
      # Pas de fallback vers anthropic/openai : exfiltration de données interdite.

  # --- Profile 3 : freemium (démo publique SaaS) ---
  # Sonnet pour tout (pas d'Opus, coûts maîtrisés). BUILD DÉSACTIVÉ (feature gate).
  freemium:
    build_enabled: false
    orchestrator: "anthropic/claude-sonnet"
    worker:       "anthropic/claude-haiku"
    fallback_chain:
      "anthropic/claude-sonnet": "anthropic/claude-haiku"
      "anthropic/claude-haiku":  "anthropic/claude-haiku"   # no-op fallback (pas de local dispo)

# =============================================================================
# Providers — connexion aux APIs / endpoints
# =============================================================================
providers:
  ollama:
    enabled: true
    base_url: "http://localhost:11434"
    timeout_seconds: 300
    models:
      mistral:7b-instruct:
        context_length: 32768
        display_name: "Mistral 7B (local)"
      mistral-nemo:
        context_length: 32768
        display_name: "Mistral Nemo (local)"
      mixtral:
        context_length: 32768        # Mixtral-8x7B Instruct — orchestrator on-premise
        display_name: "Mixtral 8x7B (local)"

  anthropic:
    enabled: true
    api_key_env: "ANTHROPIC_API_KEY"
    timeout_seconds: 600
    models:
      claude-haiku:
        model_id: "claude-haiku-4-5-20251001"
        display_name: "Claude Haiku 4.5"
      claude-sonnet:
        model_id: "claude-sonnet-4-6"
        display_name: "Claude Sonnet 4.6"
      claude-opus:
        model_id: "claude-opus-4-7"
        display_name: "Claude Opus 4.7"

  openai:
    enabled: false                   # Désactivé par défaut — fallback historique, plus utilisé depuis C-1b.
    api_key_env: "OPENAI_API_KEY"
    timeout_seconds: 300
    models:
      gpt-4o:
        model_id: "gpt-4o"
        display_name: "GPT-4o"
      gpt-4o-mini:
        model_id: "gpt-4o-mini"
        display_name: "GPT-4o mini"

# =============================================================================
# Pricing — par provider/model_alias, prix per 1M tokens.
# Source de vérité pour budget_service.py.
#
# Prix Anthropic officiels (console.anthropic.com pricing page, vérifié 2026-04-25) :
#   Claude Opus 4.7     : $5  input / $25 output per 1M tokens
#   Claude Opus 4.6     : $5  input / $25 output per 1M tokens (idem 4.7)
#   Claude Sonnet 4.6   : $3  input / $15 output per 1M tokens
#   Claude Sonnet 4.5   : $3  input / $15 output per 1M tokens
#   Claude Haiku 4.5    : $1  input / $5  output per 1M tokens
# Note : le pricing $15/$75 d'Opus 4.6 (ancien Claude 3 Opus) qui figurait
# dans ce fichier était obsolète — Opus 4.x est aligné Sonnet ×~1.7 sur input
# et ×~1.7 sur output, soit $5/$25. Migré 4.6→4.7 sans changement de prix.
# =============================================================================
pricing:
  # Anthropic — prix réels vérifiés 2026-04-18
  "anthropic/claude-opus":
    input:  5.0
    output: 25.0
  "anthropic/claude-sonnet":
    input:  3.0
    output: 15.0
  "anthropic/claude-haiku":
    input:  1.0
    output: 5.0

  # Local (Ollama) — gratuit (compute on-prem)
  "local/mistral:7b-instruct":
    input:  0.0
    output: 0.0
  "local/mistral-nemo":
    input:  0.0
    output: 0.0
  "local/mixtral":
    input:  0.0
    output: 0.0

  # OpenAI — conservé pour cohérence historique (provider désactivé par défaut)
  "openai/gpt-4o":
    input:  2.5
    output: 10.0
  "openai/gpt-4o-mini":
    input:  0.15
    output: 0.6
